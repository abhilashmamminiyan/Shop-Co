services:
  - type: web
    name: server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: ${client.url}
      - key: DATABASE_URL
        fromDatabase:
          name: shopco-db
          property: connectionString
      - key: SECRET
        generateValue: true
  - type: web
    name: client
    env: static
    buildCommand: npm run build
    staticPublishPath: build
    rootDir: client
    envVars:
      - key: REACT_APP_API_URL
        value: ${server.url}/api

databases:
  - name: shopco-db
    databaseName: shopco
    user: shopco
    plan: free